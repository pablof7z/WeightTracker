name: WeightTracker
options:
  bundleIdPrefix: com.pfer
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "26.0"

packages:
  secp256k1:
    url: https://github.com/GigaBitcoin/secp256k1.swift
    from: 0.18.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 456SHKPP26
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_STRICT_CONCURRENCY: minimal
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "202605061953"

targets:
  WeightTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Shared
      - path: Sources/iOS
      - path: Resources/iOS/Assets.xcassets
      - path: Resources/iOS/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: Resources/iOS/Info.plist
      properties:
        CFBundleDisplayName: WeightTracker
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: app.pfer.weighttracker.byok
            CFBundleURLSchemes:
              - weighttracker
        LSApplicationQueriesSchemes:
          - nostrsigner
          - primal
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "WeightTracker reads your body mass, sleep, and daily activity from Apple Health to keep your trends up to date."
        NSHealthUpdateUsageDescription: "WeightTracker writes weights you log here back to Apple Health so all your apps stay in sync."
        NSMicrophoneUsageDescription: "WeightTracker records voice check-ins so the cut coach can save notes and transcribe them with your ElevenLabs key."
        NSCameraUsageDescription: "WeightTracker uses the camera so you can photograph food labels and share them with the coach."
        BGTaskSchedulerPermittedIdentifiers:
          - app.pfer.weighttracker.refresh
        UIBackgroundModes:
          - fetch
          - processing
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pfer.weighttracker
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Resources/iOS/WeightTracker.entitlements
    entitlements:
      path: Resources/iOS/WeightTracker.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.pfer.weighttracker
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-container-identifiers:
          - iCloud.app.pfer.weighttracker
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers: []
    dependencies:
      - target: WeightTrackerWatch Watch App
        embed: true
      - package: secp256k1
        product: P256K

  WeightTrackerWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/Shared
      - path: Sources/Watch
      - path: Resources/Watch/Assets.xcassets
    info:
      path: Resources/Watch/Info.plist
      properties:
        CFBundleDisplayName: WeightTracker
        CFBundleIconName: AppIcon
        CFBundleIconFiles:
          - AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        WKApplication: true
        WKWatchOnly: false
        WKCompanionAppBundleIdentifier: app.pfer.weighttracker
        ITSAppUsesNonExemptEncryption: false
        NSHealthShareUsageDescription: "WeightTracker reads your weight from Apple Health to show your most recent reading."
        NSHealthUpdateUsageDescription: "WeightTracker writes weights you log on your watch to Apple Health."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pfer.weighttracker.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Resources/Watch/WeightTrackerWatch.entitlements
    entitlements:
      path: Resources/Watch/WeightTrackerWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.pfer.weighttracker
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

schemes:
  WeightTracker:
    build:
      targets:
        WeightTracker: all
        WeightTrackerWatch Watch App: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  WeightTrackerWatch:
    build:
      targets:
        WeightTrackerWatch Watch App: all
    run:
      config: Debug
